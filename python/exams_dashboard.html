<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Exams Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-rose-50 p-4 md:p-8 flex justify-center">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-sm border border-rose-100 overflow-hidden">
    <div class="bg-red-600 text-white p-4 font-semibold text-lg flex items-center gap-2">
      <span class="text-xl">🎯</span> 2. Exams
    </div>

    <div class="p-5 space-y-4">
      <input id="subject" class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-red-200" placeholder="Subject (e.g., Mathematics)" />
      <div class="grid grid-cols-2 gap-4">
        <div class="relative flex items-center">
          <input id="date" class="w-full p-3 pl-3 border border-gray-200 rounded-lg outline-none" placeholder="Date (e.g., 25 May 2025)" />
        </div>
        <div class="relative flex items-center">
          <input id="time" class="w-full p-3 pl-3 border border-gray-200 rounded-lg outline-none" placeholder="Time (e.g., 10:00 AM)" />
        </div>
      </div>
      <div class="flex gap-4">
        <input id="hours" class="flex-1 p-3 border border-gray-200 rounded-lg outline-none" placeholder="Total hours to study" />
        <button id="addExam" class="bg-red-600 text-white px-6 py-3 rounded-lg font-medium flex items-center gap-2 hover:bg-red-700 transition">Add Exam</button>
      </div>
    </div>

    <div class="px-5 pb-5">
      <h3 class="font-bold text-gray-800 mb-4">Upcoming Exams</h3>
      <div id="examsList" class="space-y-3"></div>
    </div>

    <div class="mx-5 mb-5 p-4 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3 text-red-700 text-sm">
      <span>💡</span>
      <p>Tip: Add exams in the order of your preparation priority!</p>
    </div>
  </div>

  <script>
    const exams = [
      { id: 1, subject: 'Mathematics', date: '25 May 2025', time: '10:00 AM', hours: 20 },
      { id: 2, subject: 'Physics', date: '02 June 2025', time: '02:00 PM', hours: 18 },
      { id: 3, subject: 'Chemistry', date: '08 June 2025', time: '10:00 AM', hours: 15 },
      { id: 4, subject: 'English', date: '15 June 2025', time: '09:00 AM', hours: 10 },
    ];

    const list = document.getElementById('examsList');
    function render() {
      list.innerHTML = '';
      exams.forEach(exam => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between p-4 border border-gray-100 rounded-xl bg-white shadow-sm hover:border-red-100 transition';
        div.innerHTML = `
          <div>
            <h4 class="font-bold text-gray-900">${exam.subject}</h4>
            <p class="text-sm text-gray-500">${exam.date}, ${exam.time}</p>
          </div>
          <div class="flex items-center gap-4 text-red-600">
            <div class="flex flex-col items-center">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span class="text-xs font-bold">${exam.hours} hrs</span>
            </div>
            <button data-id="${exam.id}" class="hover:bg-red-50 p-2 rounded-full removeBtn">Remove</button>
          </div>
        `;
        list.appendChild(div);
      });

      document.querySelectorAll('.removeBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = Number(e.currentTarget.getAttribute('data-id'));
          const idx = exams.findIndex(x => x.id === id);
          if (idx > -1) { exams.splice(idx, 1); render(); }
        });
      });
    }

    document.getElementById('addExam').addEventListener('click', () => {
      const subject = document.getElementById('subject').value.trim();
      const date = document.getElementById('date').value.trim();
      const time = document.getElementById('time').value.trim();
      const hours = Number(document.getElementById('hours').value);
      if (!subject || !date || !time || !hours) return alert('Please fill all fields');
      exams.push({ id: Date.now(), subject, date, time, hours });
      document.getElementById('subject').value=''; document.getElementById('date').value=''; document.getElementById('time').value=''; document.getElementById('hours').value='';
      render();
    });

    render();
  </script>
</body>
</html>
